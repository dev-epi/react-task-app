<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premier accès - Changer le mot de passe</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <h1>🔒 Première connexion</h1>
                <p>Veuillez changer votre mot de passe</p>
            </div>

            <div class="alert alert-info">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
                </svg>
                <div>
                    Pour des raisons de sécurité, vous devez changer votre mot de passe temporaire lors de votre première connexion.
                </div>
            </div>

            <form id="firstLoginForm">
                <div class="form-group">
                    <label for="currentPassword">Mot de passe temporaire</label>
                    <input 
                        type="password" 
                        id="currentPassword" 
                        name="currentPassword" 
                        placeholder="Mot de passe reçu par email"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="newPassword">Nouveau mot de passe</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword" 
                        placeholder="••••••••"
                        required
                    >
                    <small>Le mot de passe doit contenir au moins 8 caractères, une majuscule, une minuscule et un chiffre.</small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmer le mot de passe</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="••••••••"
                        required
                    >
                </div>

                <!-- Password strength indicator -->
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                        <span style="font-size: 12px; color: var(--text-secondary);">Force du mot de passe</span>
                        <span id="strengthText" style="font-size: 12px; font-weight: 600;"></span>
                    </div>
                    <div class="progress-bar">
                        <div id="strengthBar" class="progress-bar-fill" style="width: 0%"></div>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary btn-full">
                    Changer le mot de passe
                </button>
            </form>
        </div>
    </div>

    <script src="js/first-login.js"></script>
</body>
</html>
